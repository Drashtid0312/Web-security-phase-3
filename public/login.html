<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <main class="section">
        <div class="container">
            <div class="card">
                <h2>Login</h2>
                <form class="form" action="/auth/login" method="post">
                    <div class="form-row">
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email" required>
                    </div>

                    <div class="form-row">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" required>
                    </div>

                    <a href="./index.html"><button class="btn" type="submit">Login</button></a>
                </form>

                <p><a href="/signup">Create a new account</a></p>
                <p><a href="/auth/google">Login with Google</a></p>
            </div>
        </div>
    </main>
</body>

</html>
