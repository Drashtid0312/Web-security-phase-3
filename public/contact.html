<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Drashti Dobariya</title>
  <meta name="description" content="Contact Drashti Dobariya." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to main content</a>

  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <span class="logo" aria-hidden="true">DD</span>
        <div class="brand-text">
          <p class="name">Drashti Dobariya</p>
          <p class="tag">Web Design &amp; Development Student</p>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="dashboard.html">Dashboard</a>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Skills</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a class="btn btn-small" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main id="main">
    <section class="section">
      <div class="container">
        <div class="section-head">
          <h2>Contact</h2>
        </div>

        <div class="contact-grid">
          <div class="card">
            <h3>Reach out</h3>

            <form class="form" action="#" method="post" onsubmit="return false;" aria-label="Contact form">
              <div class="form-row">
                <label for="name">Name</label>
                <input id="name" name="name" type="text" placeholder="Your name" autocomplete="name" />
              </div>

              <div class="form-row">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" />
              </div>

              <div class="form-row">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message..."></textarea>
              </div>

              <button class="btn" type="submit" aria-disabled="true" title="Front-end only demo">Send Message</button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <p>© <span id="year">2026</span> Drashti Dobariya.</p>
      <a class="text-link" href="#main">Back to top</a>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
